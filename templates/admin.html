<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖書館管理員後台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c3e50; color: #ecf0f1; padding: 20px; }
        .card { background-color: #34495e; color: #fff; margin-bottom: 20px; border: none; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .table { color: #fff; }
        .form-control { background-color: #ecf0f1; color: #2c3e50; }
        .form-control:focus { background-color: #fff; }
    </style>
</head>
<body>

<div class="container-fluid" style="max-width: 1400px;">
    <div class="d-flex justify-content-between align-items-center my-4">
        <h2 class="fw-bold m-0 text-warning">⚙️ 圖書館核心管理後台</h2>
        <a href="/" class="btn btn-outline-light fw-bold">⬅️ 返回讀者前台</a>
    </div>
    
    <div class="row">
        <div class="col-lg-3">
            <div class="card card-body">
                <h4 class="card-title text-info fw-bold mb-3">➕ 上架新書</h4>
                <div class="mb-3">
                    <label class="form-label fw-bold">書名</label>
                    <input type="text" id="book-title" class="form-control" placeholder="例如：Python 與人工智慧">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">作者</label>
                    <input type="text" id="book-author" class="form-control" placeholder="例如：張教授">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">ISBN 碼</label>
                    <input type="text" id="book-isbn" class="form-control" placeholder="例如：978-1234567890">
                </div>
                <button class="btn btn-info w-100 mt-2 fw-bold text-dark" onclick="addBook()">確認上架書籍</button>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="card card-body">
                <h4 class="card-title text-info fw-bold mb-3">🕒 系統借閱紀錄與逾期偵測</h4>
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 25%;">書名</th>
                            <th style="width: 15%;">借閱人</th>
                            <th style="width: 20%;">借閱時間</th>
                            <th style="width: 20%;">應還時間</th>
                            <th style="width: 10%;">狀態</th>
                            <th style="width: 10%;">管理</th>
                        </tr>
                    </thead>
                    <tbody id="record-list-tbody" class="table-group-divider"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api/';

    window.onload = function() { loadRecords(); };

    async function loadRecords() {
        try {
            const response = await fetch(`${API_BASE}records/`);
            const records = await response.json();
            const tbody = document.getElementById('record-list-tbody');
            tbody.innerHTML = '';

            const now = new Date();

            records.forEach(record => {
                let statusHtml = '';
                if (record.return_date) {
                    statusHtml = '<span class="badge bg-secondary text-white">已歸還</span>';
                } else {
                    const dueDate = new Date(record.due_date);
                    if (now > dueDate) {
                        statusHtml = '<span class="badge bg-danger text-white animated flash">⚠️ 逾期中</span>';
                    } else {
                        statusHtml = '<span class="badge bg-success text-white">借閱中</span>';
                    }
                }

                const displayTitle = record.book_title || '未知書籍';
                // 雙重變數讀取，徹底消滅未知讀者
                const displayUser = record.user_name || record.reader_name || '未知讀者'; 
                
                // 顯示借閱時間與應還時間
                const borrowDateFormatted = record.borrow_date ? new Date(record.borrow_date).toLocaleString('zh-TW') : '無資料';
                const dueDateFormatted = record.due_date ? new Date(record.due_date).toLocaleString('zh-TW') : '無資料';

                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${displayTitle}</td>
                        <td>👤 ${displayUser}</td>
                        <td><small class="text-info">${borrowDateFormatted}</small></td>
                        <td><small class="text-warning">${dueDateFormatted}</small></td>
                        <td>${statusHtml}</td>
                        <td>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteRecord(${record.id})">刪除</button>
                        </td>
                    </tr>
                `;
            });
        } catch (e) { console.error("無法載入借閱紀錄:", e); }
    }

    async function addBook() {
        const title = document.getElementById('book-title').value.trim();
        const author = document.getElementById('book-author').value.trim();
        const isbn = document.getElementById('book-isbn').value.trim();
        if (!title || !author || !isbn) return alert('請完整填寫書名、作者與 ISBN 才能進行上架！');

        try {
            const response = await fetch(`${API_BASE}books/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, author: author, isbn: isbn, is_available: true })
            });
            if (response.ok) {
                alert(`📚 《${title}》上架成功！`);
                document.getElementById('book-title').value = '';
                document.getElementById('book-author').value = '';
                document.getElementById('book-isbn').value = '';
                loadRecords(); 
            } else { alert('上架失敗'); }
        } catch (e) { alert('伺服器連線失敗'); }
    }

    async function deleteRecord(id) {
        if (!confirm('確定要永久刪除這筆系統借閱紀錄嗎？')) return;
        try {
            const response = await fetch(`${API_BASE}records/${id}/`, { method: 'DELETE' });
            if (response.ok) loadRecords();
        } catch (e) { alert('連線失敗'); }
    }
</script>
</body>
</html>
